# Pro Yams AI — Default Configuration
# All values shown are the compiled-in defaults.
# Pass --config <path> to override.

num_steps: 100000

training:
  # Replay buffer
  replay_capacity: 2000000
  min_buffer_size: 10000
  train_batch_size: 512

  # Model synchronisation and checkpointing
  model_swap_interval: 100
  checkpoint_interval: 5000
  max_checkpoints: 5

  # Training target
  td_mode: mc           # mc | td0 | tdlambda
  td_lambda: 0.0        # Used only with tdlambda mode

  # Duel margin maximization: if true, targets are tanh(margin/scale) in [-1, 1]
  use_duel_margin_maximization: true
  duel_margin_maximization_scale: 4000.0

  # Exploration (softmax temperature applied by solver)
  initial_temperature: 1.0
  min_temperature: 0.1
  temperature_decay: 0.9999
  temperature_decay_start_step: 0
  temperature_decay_start_value: 0.0  # 0 = disabled; if > 0: jump to this value at decay_start_step
  initial_epsilon: 0.0

  # Evaluation
  eval_interval: 1000   # 0 = disabled
  eval_games: 200

  # Paths
  checkpoint_dir: checkpoints
  log_dir: .
  log_path: training_log.csv

  self_play:
    max_inference_batch: 1024
    min_games_per_batch: 2
    batch_timeout_ms: 5
    num_workers: 20
    num_games: 512

  model:
    input_size: 809
    hidden_layers: 3
    hidden_width: 256
    learning_rate: 0.001
    output_activation: tanh    # tanh (margin mode) | sigmoid (binary win/loss)
    loss_function: mse         # mse (for tanh/margin) | bce (for sigmoid/binary)
