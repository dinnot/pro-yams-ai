num_steps: 100000

training:
  # --- Replay Buffer & Batching ---
  replay_capacity: 1000000       # Bumped up to hold more diverse states
  min_buffer_size: 50000
  train_batch_size: 4096
  train_steps_per_collect: 0.125
  model_swap_interval: 100
  checkpoint_interval: 10000
  max_checkpoints: 3

  # --- The Champion TD Settings ---
  td_mode: tdlambda
  td_lambda: 0.95

  # --- Continuous Margin Maximization ---
  use_duel_margin_maximization: true
  duel_margin_maximization_scale: 4000.0

  # --- Potential-Based Reward Shaping ---
  use_pbrs: true
  pbrs_upper_reward: 0.1
  pbrs_clean_reward: 0.2

  # --- Exploration ---
  initial_temperature: 1.0
  min_temperature: 0.1
  temperature_decay: 0.999977         # Gently decays from 1.0 to 0.1 over 100k steps
  temperature_decay_start_step: 0
  
  # --- Heuristic Bootstrapping ---
  initial_heuristic_weight: 1.0
  heuristic_decay_steps: 20000

  # --- Evaluation & Logging ---
  eval_interval: 5000
  eval_games: 500
  checkpoint_dir: checkpoints/trial_resnet_8x512_100k
  log_dir: ./logs/trial_resnet_8x512_100k
  log_path: ./logs/trial_resnet_8x512_100k/training_log.csv
  debug_mode: false

  # --- Async Self-Play ---
  self_play:
    max_inference_batch: 4096
    min_games_per_batch: 2
    batch_timeout_ms: 5
    num_workers: 24
    num_games: 2048
    num_coordinators: 2

  # --- The Heavyweight Architecture ---
  model:
    input_size: 809
    hidden_layers: 8             # MASSIVE DEPTH
    hidden_width: 512            # MASSIVE CAPACITY
    learning_rate: 0.00025       # Slightly lowered for stability in an 8-layer network
    architecture: resnet         
    output_activation: tanh      
    loss_function: mse