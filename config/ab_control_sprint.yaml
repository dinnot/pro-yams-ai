num_steps: 10000

training:
  replay_capacity: 1000000
  min_buffer_size: 200000
  train_batch_size: 8192
  train_steps_per_collect: 0.125
  model_swap_interval: 10
  checkpoint_interval: 2000
  max_checkpoints: 2

  td_mode: mc
  td_lambda: 0.8

  initial_temperature: 1.0
  min_temperature: 0.1
  temperature_decay: 0.999712         # Hits 0.1 at ~80k steps

  eval_interval: 2000
  eval_games: 500

  checkpoint_dir: checkpoints/ab_control_sprint9
  log_dir: ./logs/ab_control_sprint9
  log_path: ./logs/ab_control_sprint9/training_log.csv

  self_play:
    max_inference_batch: 4096
    min_games_per_batch: 2
    batch_timeout_ms: 5
    num_workers: 24
    num_games: 2048
    num_coordinators: 2
    debug_mode: true
    debug_log_path: "./logs/ab_control_sprint9/debug_coordinator.log"

  model:
    input_size: 986
    hidden_layers: 3
    hidden_width: 256
    learning_rate: 0.0005
    debug_mode: true
    debug_log_path: "./logs/ab_control_sprint9/debug_batch.log"