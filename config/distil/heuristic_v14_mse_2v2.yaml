distil:
  teacher_kind: heuristic
  teacher_heuristic_version: 14
  game_variant: 2v2

  self_play:
    num_workers: 16
    num_games: 512

  student:
    hidden_layers: 3
    hidden_width: 512
    architecture: mlp
    output_activation: sigmoid
    loss_function: mse
    learning_rate: 0.0004

  train_batch_size: 16384
  replay_buffer_capacity: 1000000
  min_samples_to_start: 16384
  samples_per_train: 1.0

  max_steps: 200000
  min_steps: 10000

  reference_heuristic_version: 14
  convergence_win_rate_delta: 0.02
  convergence_patience: 3
  convergence_match_mse: -1.0

  samples_per_games_rate: 0.05

  eval_interval: 10000
  eval_games: 1000
  final_eval_games: 1000

  checkpoint_interval: 10000
  max_checkpoints: 20

  use_duel_margin_maximization: false
  duel_margin_maximization_scale: 20000.0

  checkpoint_dir: checkpoints/distil_v14_mse_2v2_v2
  log_dir: logs/distil_v14_mse_2v2_v2
  log_path: logs/distil_v14_mse_2v2_v2/distil_log.csv
