distil:
  teacher_kind: heuristic
  teacher_heuristic_version: 14
  game_variant: 2v2

  self_play:
    num_workers: 16
    num_games: 512

  student:
    hidden_layers: 3
    hidden_width: 512
    architecture: mlp
    output_activation: sigmoid
    loss_function: bce

  train_batch_size: 16384
  shuffle_chunk_size: 262144
  min_chunk_size_to_start: 16384
  max_buffered_samples: 2000000

  max_steps: 500000
  min_steps: 5000

  reference_heuristic_version: 14
  convergence_win_rate_delta: 0.02
  convergence_patience: 3
  convergence_match_mse: -1.0

  eval_interval: 5000
  eval_games: 500
  final_eval_games: 1000

  checkpoint_interval: 5000
  max_checkpoints: 2

  use_duel_margin_maximization: false
  duel_margin_maximization_scale: 4000.0

  checkpoint_dir: checkpoints/distil_v14_2v2
  log_dir: logs/distil_v14_2v2
  log_path: logs/distil_v14_2v2/distil_log.csv
