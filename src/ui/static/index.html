<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Yams AI</title>
<link rel="stylesheet" href="css/style.css">
<script src="lib/chart.min.js"></script>
</head>
<body>
<header>
  <h1>Pro Yams AI</h1>
  <nav>
    <button class="tab-btn active" data-tab="game">Game</button>
    <button class="tab-btn" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="comparison">Run Comparison</button>
    <button class="tab-btn" data-tab="tournament">Tournament</button>
    <button class="tab-btn" data-tab="games">Recorded Games</button>
  </nav>
</header>

<main>
  <!-- ===== GAME VIEW ===== -->
  <section id="tab-game" class="tab-section active">
    <div class="game-controls">
      <button id="btn-new-game">New Game</button>
      <select id="sel-p0">
        <option value="heuristic_v17">P0: Heuristic V17 (V14+Win Odds)</option>
        <option value="heuristic_v16">P0: Heuristic V16 (V13+Win Odds)</option>
        <option value="heuristic_v15">P0: Heuristic V15 (V13+aggr upper bonus)</option>
        <option value="heuristic_v14">P0: Heuristic V14 (V13+upper bonus prot)</option>
        <option value="heuristic_v13">P0: Heuristic V13 (best, ~57%)</option>
        <option value="heuristic_v12">P0: Heuristic V12 (smooth+ehc.5+csq.20)</option>
        <option value="heuristic_v11">P0: Heuristic V11 (smooth+ehc1+csq.05)</option>
        <option value="heuristic_v10">P0: Heuristic V10 (smooth+ehc.5+csq.12)</option>
        <option value="heuristic_v9">P0: Heuristic V9 (smooth+csq.50+turbo)</option>
        <option value="heuristic_v8">P0: Heuristic V8 (smooth+csq.20+turbo)</option>
        <option value="heuristic_v7">P0: Heuristic V7 (smooth+csq.10+turbo)</option>
        <option value="heuristic_v6">P0: Heuristic V6 (smooth+csq.20)</option>
        <option value="heuristic_v5">P0: Heuristic V5 (smooth+ehc1.5)</option>
        <option value="heuristic_v4">P0: Heuristic V4 (smooth+ehc1.0)</option>
        <option value="heuristic_v3">P0: Heuristic V3 (Strategic)</option>
        <option value="heuristic_v2">P0: Heuristic V2 (DP)</option>
        <option value="heuristic_v1">P0: Heuristic V1 (Greedy)</option>
        <option value="human">P0: Human</option>
        <option value="nn">P0: NN</option>
        <option value="mc">P0: MC Rollout</option>
      </select>
      <select id="sel-p1">
        <option value="heuristic_v17">P1: Heuristic V17 (V14+Win Odds)</option>
        <option value="heuristic_v16">P1: Heuristic V16 (V13+Win Odds)</option>
        <option value="heuristic_v15">P1: Heuristic V15 (V13+aggr upper bonus)</option>
        <option value="heuristic_v14">P1: Heuristic V14 (V13+upper bonus prot)</option>
        <option value="heuristic_v13">P1: Heuristic V13 (best, ~57%)</option>
        <option value="heuristic_v12">P1: Heuristic V12 (smooth+ehc.5+csq.20)</option>
        <option value="heuristic_v11">P1: Heuristic V11 (smooth+ehc1+csq.05)</option>
        <option value="heuristic_v10">P1: Heuristic V10 (smooth+ehc.5+csq.12)</option>
        <option value="heuristic_v9">P1: Heuristic V9 (smooth+csq.50+turbo)</option>
        <option value="heuristic_v8">P1: Heuristic V8 (smooth+csq.20+turbo)</option>
        <option value="heuristic_v7">P1: Heuristic V7 (smooth+csq.10+turbo)</option>
        <option value="heuristic_v6">P1: Heuristic V6 (smooth+csq.20)</option>
        <option value="heuristic_v5">P1: Heuristic V5 (smooth+ehc1.5)</option>
        <option value="heuristic_v4">P1: Heuristic V4 (smooth+ehc1.0)</option>
        <option value="heuristic_v3">P1: Heuristic V3 (Strategic)</option>
        <option value="heuristic_v2">P1: Heuristic V2 (DP)</option>
        <option value="heuristic_v1">P1: Heuristic V1 (Greedy)</option>
        <option value="human">P1: Human</option>
        <option value="nn">P1: NN</option>
        <option value="mc">P1: MC Rollout</option>
      </select>
      <!-- 2v2-only player selectors: shown only when /api/info reports a 4-player variant. -->
      <select id="sel-p2" class="sel-2v2-only" hidden>
        <option value="heuristic_v17">P2: Heuristic V17 (V14+Win Odds)</option>
        <option value="heuristic_v16">P2: Heuristic V16 (V13+Win Odds)</option>
        <option value="heuristic_v15">P2: Heuristic V15 (V13+aggr upper bonus)</option>
        <option value="heuristic_v14">P2: Heuristic V14 (V13+upper bonus prot)</option>
        <option value="heuristic_v13">P2: Heuristic V13 (best, ~57%)</option>
        <option value="heuristic_v12">P2: Heuristic V12 (smooth+ehc.5+csq.20)</option>
        <option value="heuristic_v11">P2: Heuristic V11 (smooth+ehc1+csq.05)</option>
        <option value="heuristic_v10">P2: Heuristic V10 (smooth+ehc.5+csq.12)</option>
        <option value="heuristic_v9">P2: Heuristic V9 (smooth+csq.50+turbo)</option>
        <option value="heuristic_v8">P2: Heuristic V8 (smooth+csq.20+turbo)</option>
        <option value="heuristic_v7">P2: Heuristic V7 (smooth+csq.10+turbo)</option>
        <option value="heuristic_v6">P2: Heuristic V6 (smooth+csq.20)</option>
        <option value="heuristic_v5">P2: Heuristic V5 (smooth+ehc1.5)</option>
        <option value="heuristic_v4">P2: Heuristic V4 (smooth+ehc1.0)</option>
        <option value="heuristic_v3">P2: Heuristic V3 (Strategic)</option>
        <option value="heuristic_v2">P2: Heuristic V2 (DP)</option>
        <option value="heuristic_v1">P2: Heuristic V1 (Greedy)</option>
        <option value="human">P2: Human</option>
        <option value="nn">P2: NN</option>
      </select>
      <select id="sel-p3" class="sel-2v2-only" hidden>
        <option value="heuristic_v17">P3: Heuristic V17 (V14+Win Odds)</option>
        <option value="heuristic_v16">P3: Heuristic V16 (V13+Win Odds)</option>
        <option value="heuristic_v15">P3: Heuristic V15 (V13+aggr upper bonus)</option>
        <option value="heuristic_v14">P3: Heuristic V14 (V13+upper bonus prot)</option>
        <option value="heuristic_v13">P3: Heuristic V13 (best, ~57%)</option>
        <option value="heuristic_v12">P3: Heuristic V12 (smooth+ehc.5+csq.20)</option>
        <option value="heuristic_v11">P3: Heuristic V11 (smooth+ehc1+csq.05)</option>
        <option value="heuristic_v10">P3: Heuristic V10 (smooth+ehc.5+csq.12)</option>
        <option value="heuristic_v9">P3: Heuristic V9 (smooth+csq.50+turbo)</option>
        <option value="heuristic_v8">P3: Heuristic V8 (smooth+csq.20+turbo)</option>
        <option value="heuristic_v7">P3: Heuristic V7 (smooth+csq.10+turbo)</option>
        <option value="heuristic_v6">P3: Heuristic V6 (smooth+csq.20)</option>
        <option value="heuristic_v5">P3: Heuristic V5 (smooth+ehc1.5)</option>
        <option value="heuristic_v4">P3: Heuristic V4 (smooth+ehc1.0)</option>
        <option value="heuristic_v3">P3: Heuristic V3 (Strategic)</option>
        <option value="heuristic_v2">P3: Heuristic V2 (DP)</option>
        <option value="heuristic_v1">P3: Heuristic V1 (Greedy)</option>
        <option value="human">P3: Human</option>
        <option value="nn">P3: NN</option>
      </select>
      <label class="debug-label" title="Record bot hold/placement evaluations for inspection">
        <input type="checkbox" id="chk-debug"> Debug mode
      </label>
      <button id="btn-step" disabled>Step</button>
      <button id="btn-play-all" disabled>Play All</button>
      <button id="btn-show-tensor" disabled title="Show neural network input tensor for the current board">Show Tensor</button>
    </div>

    <!-- Load from a pasted board position (copied from a turn-history row). -->
    <div class="position-controls">
      <input type="text" id="position-input" class="position-input"
             placeholder="Paste a board position (PY1;…) to start from it" />
      <button id="btn-load-position" title="Start a new game from the pasted board position">Load Position</button>
      <span id="position-error" class="position-error" style="display:none"></span>
    </div>

    <div id="game-status" class="status-bar"></div>

    <div class="game-layout">
      <!-- Dice area -->
      <div class="dice-panel">
        <div id="dice-display" class="dice-row"></div>
        <div class="dice-info">
          Rolls left: <span id="rolls-left">-</span>
        </div>
        <button id="btn-reroll" disabled>Reroll</button>
      </div>

      <!-- NN eval (debug mode) -->
      <div id="nn-eval-panel" class="nn-eval-panel" style="display:none">
        <span class="nn-eval-label">NN eval:</span>
        <span id="nn-eval-value" class="nn-eval-value">—</span>
      </div>

      <!-- Boards -->
      <div class="boards-area">
        <div id="board-p0" class="board-container">
          <h3>Player 0 <span class="player-label" id="p0-type"></span></h3>
          <div id="board-grid-0" class="board-grid"></div>
        </div>
        <div id="board-p1" class="board-container">
          <h3>Player 1 <span class="player-label" id="p1-type"></span></h3>
          <div id="board-grid-1" class="board-grid"></div>
        </div>
      </div>

      <!-- Human options -->
      <div class="options-panel" id="options-panel" style="display:none">
        <h4 id="legal-placements-toggle"><span class="toggle-arrow">▶</span> Legal Placements</h4>
        <div id="options-list" style="display:none"></div>
      </div>
    </div>

    <!-- Score breakdown (shown on game over) -->
    <div id="score-breakdown" class="score-breakdown-panel" style="display:none"></div>

    <!-- Turn history -->
    <div class="history-panel">
      <h4>Turn History</h4>
      <div id="history-log" class="history-log"></div>
    </div>

    <!-- Tensor inspector modal -->
    <div id="tensor-modal" class="tensor-modal" style="display:none">
      <div class="tensor-modal-backdrop"></div>
      <div class="tensor-modal-content">
        <div class="tensor-modal-header">
          <h3>Neural Network Input Tensor</h3>
          <div class="tensor-modal-meta" id="tensor-meta"></div>
          <div class="tensor-modal-controls">
            <label>Perspective:
              <select id="tensor-perspective">
                <option value="0">Player 0</option>
                <option value="1">Player 1</option>
              </select>
            </label>
            <label><input type="checkbox" id="tensor-only-nonzero"> Hide zero values</label>
            <button id="btn-tensor-close">Close</button>
          </div>
        </div>
        <div id="tensor-modal-body" class="tensor-modal-body"></div>
      </div>
    </div>
  </section>

  <!-- ===== DASHBOARD ===== -->
  <section id="tab-dashboard" class="tab-section">
    <div class="dashboard-controls">
      <label>Log directory: <input id="dash-log-dir" type="text" value="."></label>
      <button id="btn-load-dash">Load</button>
      <label><input type="checkbox" id="dash-auto-refresh"> Auto-refresh (5s)</label>
    </div>
    <div class="stats-row" id="current-stats"></div>
    <div class="charts-grid">
      <div class="chart-box"><canvas id="chart-loss"></canvas></div>
      <div class="chart-box"><canvas id="chart-winrate"></canvas></div>
      <div class="chart-box"><canvas id="chart-win-margin"></canvas></div>
      <div class="chart-box"><canvas id="chart-temperature"></canvas></div>
      <div class="chart-box"><canvas id="chart-games"></canvas></div>
      <div class="chart-box"><canvas id="chart-games-per-sec"></canvas></div>
    </div>
  </section>

  <!-- ===== TOURNAMENT ===== -->
  <section id="tab-tournament" class="tab-section">
    <div class="tour-setup">
      <h3>Add Participant</h3>
      <div class="tour-add-row">
        <select id="tour-part-type">
          <option value="kHeuristicV17">Heuristic V17 (V14+Win Odds)</option>
          <option value="kHeuristicV16">Heuristic V16 (V13+Win Odds)</option>
          <option value="kHeuristicV15">Heuristic V15 (V13+aggr upper bonus)</option>
          <option value="kHeuristicV14">Heuristic V14 (V13+upper bonus prot)</option>
          <option value="kHeuristicV13">Heuristic V13 (best ~57%)</option>
          <option value="kHeuristicV12">Heuristic V12</option>
          <option value="kHeuristicV11">Heuristic V11</option>
          <option value="kHeuristicV10">Heuristic V10</option>
          <option value="kHeuristicV9">Heuristic V9</option>
          <option value="kHeuristicV8">Heuristic V8</option>
          <option value="kHeuristicV7">Heuristic V7</option>
          <option value="kHeuristicV6">Heuristic V6</option>
          <option value="kHeuristicV5">Heuristic V5</option>
          <option value="kHeuristicV4">Heuristic V4</option>
          <option value="kHeuristicV3">Heuristic V3 (Strategic)</option>
          <option value="kHeuristicV2">Heuristic V2 (DP)</option>
          <option value="kHeuristicV1">Heuristic V1 (Greedy)</option>
          <option value="kNN">Neural Net (Checkpoint)</option>
        </select>
        <select id="tour-part-ckpt" style="display:none"></select>
        <input type="text" id="tour-part-name" placeholder="Display Name">
        <button id="btn-tour-add">Add Bot</button>
        <button id="btn-tour-refresh-models" type="button" title="Reload checkpoint list">↻</button>
      </div>
      <ul id="tour-participants-list" class="tour-participants"></ul>
    </div>

    <div class="tour-launch">
      <label>Games per matchup:
        <input type="number" id="tour-games" value="100" min="1" max="10000">
      </label>
      <button id="btn-tour-start">Start Tournament</button>
      <button id="btn-tour-stop" disabled>Stop</button>
    </div>

    <div class="tour-results">
      <div id="tour-progress" class="tour-progress" style="display:none">
        <progress id="tour-progress-bar" value="0" max="100"></progress>
        <span id="tour-progress-text"></span>
      </div>
      <div id="tour-error" class="tour-error" style="display:none"></div>
      <div class="tour-summary-wrap">
        <table id="tour-summary" class="tour-table tour-summary"></table>
      </div>
      <div class="tour-matrix-wrap">
        <table id="tour-matrix" class="tour-table"></table>
      </div>
    </div>
  </section>

  <!-- ===== RECORDED GAMES ===== -->
  <section id="tab-games" class="tab-section">
    <div class="games-controls">
      <button id="btn-games-refresh">Refresh</button>
      <span id="games-overall" class="games-overall"></span>
    </div>

    <h3>Per-checkpoint performance vs. humans</h3>
    <div class="games-stats-wrap">
      <table id="games-stats-table" class="tour-table"></table>
    </div>

    <h3>Per-human performance <span class="games-overall" style="font-weight:normal;">(identified by client IP + user-agent)</span></h3>
    <div class="games-stats-wrap">
      <table id="games-humans-table" class="tour-table"></table>
    </div>

    <h3>Games</h3>
    <div class="games-filter-bar">
      <label>Checkpoint:
        <select id="games-filter-checkpoint"><option value="">All</option></select>
      </label>
      <label>Variant:
        <select id="games-filter-variant">
          <option value="">All</option>
          <option value="1v1">1v1</option>
          <option value="2v2">2v2</option>
        </select>
      </label>
      <label>Outcome (human):
        <select id="games-filter-outcome">
          <option value="">All</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
          <option value="draw">Draw</option>
        </select>
      </label>
      <button id="btn-games-apply">Apply</button>
    </div>
    <div class="games-list-wrap">
      <table id="games-list-table" class="tour-table"></table>
    </div>
    <div class="games-pager">
      <button id="btn-games-prev" disabled>← Prev</button>
      <span id="games-page-info"></span>
      <button id="btn-games-next" disabled>Next →</button>
    </div>

    <!-- Replay modal -->
    <div id="games-replay-modal" class="tensor-modal" style="display:none">
      <div class="tensor-modal-backdrop" id="games-replay-backdrop"></div>
      <div class="tensor-modal-content">
        <div class="tensor-modal-header">
          <h3>Game Replay</h3>
          <div class="tensor-modal-meta" id="games-replay-meta"></div>
          <div class="tensor-modal-controls">
            <button id="btn-replay-first">⏮</button>
            <button id="btn-replay-prev">◀ Prev turn</button>
            <span id="replay-turn-info"></span>
            <button id="btn-replay-next">Next turn ▶</button>
            <button id="btn-replay-last">⏭</button>
            <button id="btn-replay-breakdown">📊 Score breakdown</button>
            <button id="btn-replay-eval">🎯 Load checkpoint</button>
            <button id="btn-games-replay-close">Close</button>
          </div>
          <div class="tensor-modal-controls">
            <span id="replay-eval-info" class="replay-eval"></span>
          </div>
        </div>
        <div id="games-replay-body" class="tensor-modal-body"></div>
      </div>
    </div>
  </section>

  <!-- ===== RUN COMPARISON ===== -->
  <section id="tab-comparison" class="tab-section">
    <div class="comparison-controls">
      <textarea id="comp-dirs" rows="4" placeholder="One log directory per line"></textarea>
      <button id="btn-load-comparison">Load Runs</button>
    </div>
    <div class="chart-box-full">
      <canvas id="chart-comparison-loss"></canvas>
    </div>
    <div class="chart-box-full">
      <canvas id="chart-comparison-wr"></canvas>
    </div>
  </section>
</main>

<script src="js/api.js"></script>
<script src="js/position.js"></script>
<script src="js/board.js"></script>
<script src="js/debug.js"></script>
<script src="js/tensor.js"></script>
<script src="js/game.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/comparison.js"></script>
<script src="js/tournament.js"></script>
<script src="js/games.js"></script>
<script src="js/app.js"></script>
</body>
</html>
